name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme MarkdownEditorKit \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            | xcpretty && exit ${PIPESTATUS[0]}
